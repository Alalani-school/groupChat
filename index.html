<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>C4E Chat</title>

<style>
body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui}
.wrap{max-width:950px;margin:20px auto;padding:0 16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:12px}
input,button{padding:8px;border-radius:8px;border:1px solid #30363d}
input{background:#000;color:#fff}
button{background:#238636;color:#fff;border:none;cursor:pointer}
button.secondary{background:#30363d}
button.danger{background:#da3633}
button:disabled{opacity:.5}
#chat{height:420px;overflow:auto;background:#000;border-radius:10px;padding:10px}
.msg{border-bottom:1px solid #111;padding:6px;display:flex;gap:8px}
.meta{font-size:12px;color:#8b949e;width:170px}
.bubble{flex:1}
.reactions button{font-size:11px;margin-right:4px}
.admin{border:1px solid #da3633}
.small{font-size:12px;color:#8b949e}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<input id="username" placeholder="Username">
<button onclick="join()">Join</button>
<button onclick="leave()">Leave</button>
<div id="online" class="small"></div>
</div>

<div class="card">
<div id="announcement"></div>
<div id="chat"></div>
<div id="typing" class="small"></div>
</div>

<div class="card">
<input id="message" placeholder="Message..." disabled>
<button onclick="send()" id="sendBtn" disabled>Send</button>
</div>

<div class="card admin" id="adminPanel" style="display:none">
<h3>Admin Tools</h3>
<input id="annText" placeholder="Announcement">
<button onclick="setAnn()">Post</button>
<button onclick="clearAnn()" class="danger">Clear</button>
<br><br>
<button onclick="toggleLock()" class="danger">Toggle Lock</button>
<button onclick="purge()" class="danger">Purge Messages</button>
</div>

</div>

<script>
const TOKEN="ghp_YOUR_TOKEN";
const REPO="alalani-school/groupChat";
const PATH="chat.json";
const POLL=1200;
const ADMIN_USERS=["admin","Amaan"];
const REACTIONS=["👍","😂","🔥","💀","👀"];
const MAX_MSG=300;

let DB=null;
let SHA="";
let me=null;

function $(id){return document.getElementById(id)}
function now(){return Date.now()}
function iso(){return new Date().toISOString()}
function uid(){return Math.random().toString(16).slice(2)}

function isAdmin(){return me && ADMIN_USERS.includes(me)}

async function getDB(){
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}?t=${Date.now()}`,
    {headers:{Authorization:`Bearer ${TOKEN}`}}
  );
  const d=await r.json();
  SHA=d.sha;
  return JSON.parse(atob(d.content));
}

async function saveDB(retry=true){
  try{
    const content=btoa(JSON.stringify(DB,null,2));
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{
      method:"PUT",
      headers:{
        Authorization:`Bearer ${TOKEN}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"update",
        content,
        sha:SHA
      })
    });

    if(r.status===409 && retry){
      await sync();
      return saveDB(false);
    }

  }catch(e){
    console.log("save error",e);
  }
}

async function sync(){
  DB=await getDB();
  render();
}

async function push(){
  await saveDB();
  await sync();
}

function render(){
  if(!DB) return;

  // cleanup online
  for(const u in DB.online)
    if(now()-DB.online[u]>5000) delete DB.online[u];

  $("online").textContent="Online: "+Object.keys(DB.online).join(", ");
  $("announcement").textContent=DB.announcement||"";

  const chat=$("chat");
  chat.innerHTML="";

  DB.messages.slice(-MAX_MSG).forEach(m=>{
    const row=document.createElement("div");
    row.className="msg";

    const meta=document.createElement("div");
    meta.className="meta";
    meta.innerText=m.user+"\n"+new Date(m.time).toLocaleTimeString();

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.innerText=m.text;

    const react=document.createElement("div");
    react.className="reactions";

    REACTIONS.forEach(r=>{
      const btn=document.createElement("button");
      const count=m.reactions?.[r]?.length||0;
      btn.textContent=r+(count?(" "+count):"");
      btn.className="secondary";
      btn.onclick=()=>toggleReaction(m.id,r);
      react.appendChild(btn);
    });

    if(isAdmin()){
      const del=document.createElement("button");
      del.textContent="🗑";
      del.className="danger";
      del.onclick=()=>deleteMsg(m.id);
      react.appendChild(del);
    }

    row.appendChild(meta);
    row.appendChild(bubble);
    row.appendChild(react);
    chat.appendChild(row);
  });

  const typingUsers=Object.entries(DB.typing||{})
    .filter(([u,t])=>now()-t<3000 && u!==me)
    .map(([u])=>u);

  $("typing").textContent=
    typingUsers.length?typingUsers.join(", ")+" typing...":"";

  $("message").disabled=!me || DB.locked;
  $("sendBtn").disabled=!me || DB.locked;

  $("adminPanel").style.display=isAdmin()?"block":"none";
}

async function join(){
  const name=$("username").value.trim();
  if(!name) return;

  me=name;
  DB.online[name]=now();
  DB.messages.push({id:uid(),user:"system",text:name+" joined",time:iso(),reactions:{}});
  await push();
}

async function leave(){
  if(!me) return;
  delete DB.online[me];
  DB.messages.push({id:uid(),user:"system",text:me+" left",time:iso(),reactions:{}});
  me=null;
  await push();
}

async function send(){
  if(!me || DB.locked) return;
  const text=$("message").value.trim();
  if(!text) return;

  DB.messages.push({
    id:uid(),
    user:me,
    text,
    time:iso(),
    reactions:{}
  });

  $("message").value="";
  await push();
}

function toggleReaction(id,emoji){
  if(!me) return;
  const m=DB.messages.find(x=>x.id===id);
  if(!m) return;

  m.reactions ||= {};
  m.reactions[emoji] ||= [];

  const i=m.reactions[emoji].indexOf(me);
  if(i>=0) m.reactions[emoji].splice(i,1);
  else m.reactions[emoji].push(me);

  push();
}

function deleteMsg(id){
  DB.messages=DB.messages.filter(m=>m.id!==id);
  push();
}

function setAnn(){
  DB.announcement=$("annText").value;
  push();
}

function clearAnn(){
  DB.announcement="";
  push();
}

function toggleLock(){
  DB.locked=!DB.locked;
  push();
}

function purge(){
  DB.messages=[];
  push();
}

$("message").addEventListener("input",()=>{
  if(me) DB.typing[me]=now();
});

setInterval(async()=>{
  await sync();
  if(me){
    DB.online[me]=now();
    await saveDB();
  }
},POLL);

sync();
</script>

</body>
</html>
