<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>C4E Chat</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0d1117;
  color:#c9d1d9;
}
.wrap{max-width:900px;margin:20px auto;padding:0 16px}
.card{
  background:#161b22;
  border:1px solid #30363d;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
}
input,button{
  padding:8px;
  border-radius:8px;
  border:1px solid #30363d;
}
input{background:#000;color:#fff}
button{background:#238636;color:#fff;border:none;cursor:pointer}
button:disabled{opacity:.5}
#chat{
  height:400px;
  overflow:auto;
  background:#000;
  padding:10px;
  border-radius:10px;
}
.msg{
  border-bottom:1px solid #111;
  padding:6px 0;
}
.meta{
  font-size:12px;
  color:#8b949e;
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<input id="username" placeholder="Username">
<button onclick="join()">Join</button>
<button onclick="leave()">Leave</button>
<div id="online"></div>
</div>

<div class="card">
<div id="announcement"></div>
<div id="chat"></div>
<div id="typing"></div>
</div>

<div class="card">
<input id="message" placeholder="Message..." disabled>
<button onclick="send()" id="sendBtn" disabled>Send</button>
</div>

</div>

<script>
const g1 = "ghp_"
const g2 = "bbqUe5K7A60ohiruHcby";
const g3 = "p4s0zy65Zt0iHYJ4";
const TOKEN=g1 + g2 + g3;
const REPO="alalani-school/groupChat";
const PATH="chat.json";
const POLL=1500;

let DB=null;
let SHA="";
let me=null;

function $(id){return document.getElementById(id)}
function now(){return Date.now()}
function iso(){return new Date().toISOString()}
function uid(){return Math.random().toString(16).slice(2)}

async function getDB(){
  const r=await fetch(
    `https://api.github.com/repos/${REPO}/contents/${PATH}?t=${Date.now()}`,
    {headers:{Authorization:`Bearer ${TOKEN}`}}
  );
  const d=await r.json();
  SHA=d.sha;
  return JSON.parse(atob(d.content));
}

async function saveDB(){
  const content=btoa(JSON.stringify(DB,null,2));
  await fetch(
    `https://api.github.com/repos/${REPO}/contents/${PATH}`,
    {
      method:"PUT",
      headers:{
        Authorization:`Bearer ${TOKEN}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"update",
        content,
        sha:SHA
      })
    }
  );
}

function render(){
  if(!DB) return;

  // online cleanup
  for(const u in DB.online){
    if(now()-DB.online[u]>5000) delete DB.online[u];
  }

  $("online").textContent =
    "Online: " + Object.keys(DB.online).join(", ");

  $("announcement").textContent = DB.announcement || "";

  const chat=$("chat");
  chat.innerHTML="";
  DB.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`
      <div class="meta">${m.user} — ${new Date(m.time).toLocaleTimeString()}</div>
      <div>${m.text}</div>
    `;
    chat.appendChild(div);
  });

  // typing
  const typingUsers=Object.entries(DB.typing)
    .filter(([u,t])=>now()-t<3000 && u!==me)
    .map(([u])=>u);

  $("typing").textContent =
    typingUsers.length
      ? typingUsers.join(", ")+" typing..."
      : "";
}

async function sync(){
  DB=await getDB();
  render();
}

async function push(){
  await saveDB();
  await sync();
}

async function join(){
  const name=$("username").value.trim();
  if(!name) return alert("Username required");

  me=name;
  DB.online[name]=now();
  DB.messages.push({
    id:uid(),
    user:"system",
    text:name+" joined",
    time:iso()
  });

  $("message").disabled=false;
  $("sendBtn").disabled=false;

  await push();
}

async function leave(){
  if(!me) return;
  delete DB.online[me];
  DB.messages.push({
    id:uid(),
    user:"system",
    text:me+" left",
    time:iso()
  });
  me=null;
  $("message").disabled=true;
  $("sendBtn").disabled=true;
  await push();
}

async function send(){
  if(!me) return;
  if(DB.locked) return alert("Chat locked");

  const text=$("message").value.trim();
  if(!text) return;

  DB.messages.push({
    id:uid(),
    user:me,
    text,
    time:iso()
  });

  $("message").value="";
  await push();
}

$("message").addEventListener("input",()=>{
  if(!me) return;
  DB.typing[me]=now();
});

setInterval(async()=>{
  await sync();
  if(me){
    DB.online[me]=now();
    await saveDB();
  }
},POLL);

sync();
</script>

</body>
</html>
