<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C4E Group Chat</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --primary:#238636; --danger:#da3633; --accent:#1f6feb;}
  body{margin:0;font-family:system-ui,Segoe UI,sans-serif;background:var(--bg);color:var(--text);user-select:none}
  .wrap{max-width:900px;margin:16px auto;padding:0 16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  input,button,select{border-radius:8px;border:1px solid var(--border);padding:10px;font-size:14px}
  input,select{background:#000;color:#fff;flex:1;min-width:160px}
  button{cursor:pointer;background:var(--primary);border:none;color:#fff;font-weight:700}
  button.secondary{background:#30363d}
  button.danger{background:var(--danger)}
  button:disabled{opacity:.55;cursor:not-allowed}
  #topbar{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:10px}
  #chat{height:420px;overflow:auto;background:#000;border:1px solid var(--border);border-radius:10px;padding:10px}
  .msg{padding:8px 10px;border-bottom:1px solid #111;display:flex;gap:10px}
  .meta{min-width:180px;color:var(--muted);font-size:12px}
  .bubble{flex:1}
  .sys .bubble{color:#ffd33d}
  .ann{background:var(--accent);color:#fff;border-radius:10px;padding:10px;display:none;margin-bottom:12px}
  .pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;border:1px solid var(--border);color:var(--muted)}
  .ok{color:#3fb950;border-color:#3fb95055}
  .bad{color:#ff7b72;border-color:#ff7b7255}
  .small{font-size:12px;color:var(--muted)}
</style>
</head>

<body oncontextmenu="return false;">
<div id="topbar">
  <div class="wrap row" style="align-items:center;justify-content:space-between">
    <div>
      <b>C4E Chat</b>
      <span id="livePill" class="pill">syncing…</span>
      <span id="lockPill" class="pill" style="display:none">🔒 locked</span>
    </div>
    <div class="small" id="whoami"></div>
  </div>
</div>

<div class="wrap">
  <div id="announcement" class="ann"></div>

  <div class="card">
    <div class="row">
      <input id="username" placeholder="Username (saved)" maxlength="18" />
      <button class="secondary" id="joinBtn" onclick="joinChat()">Join</button>
      <button class="secondary danger" id="leaveBtn" onclick="leaveChat()" disabled>Leave</button>
    </div>
    <div class="small">Username is sanitized for HTML injection</div>
  </div>

  <div class="card">
    <div id="chat" aria-live="polite"></div>
  </div>

  <div class="card">
    <div class="row">
      <input id="message" placeholder="Type a message…" maxlength="240" disabled />
      <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
    <div class="small" id="cooldownHint"></div>
  </div>

  <div id="adminPanel" class="card" style="display:none;border:1px solid var(--danger)">
    <h3 style="margin-top:0">⚙️ Admin Tools</h3>
    <div class="row">
      <input id="admAnn" placeholder="Announcement text…" maxlength="200"/>
      <button onclick="setAnnouncement()">Post</button>
      <button class="danger" onclick="clearAnnouncement()">Clear</button>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="danger" onclick="toggleLock()" id="lockBtn">Lock Chat</button>
      <button class="danger" onclick="purgeChat()">Purge Messages</button>
    </div>
    <div class="small">Admins can delete individual messages via the 🗑️ button next to each one.</div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 8px 0">📜 Security / Activity Log</h3>
    <div id="secLog" class="small" style="white-space:pre-wrap;max-height:120px;overflow:auto;background:#000;border:1px solid var(--border);border-radius:10px;padding:10px"></div>
  </div>
</div>

<script>
const TYPING_TTL = 3000;
const ONLINE_TTL = 5000;

const p1="ghp_";
const p2="bbqUe5K7A60ohiruHcby";
const p3="p4s0zy65Zt0iHYJ4";
// ===== very bad security =====
(function hardcoreSecurity(){

  function report(reason){
    console.warn("SECURITY:", reason);
  }

  // Disable right click
  document.addEventListener("contextmenu", e => {
    report("Right click blocked");
    e.preventDefault();
  });

  // Block common DevTools shortcuts
  document.addEventListener("keydown", e => {
    const forbidden = [123, 73, 74, 67, 85]; // F12, I, J, C, U
    if (
      forbidden.includes(e.keyCode) &&
      (e.ctrlKey || e.shiftKey || e.keyCode === 123)
    ) {
      report("DevTools shortcut blocked");
      e.preventDefault();
      return false;
    }
  });

  // Detect DevTools via window resize trick
  let devtoolsOpen = false;
  const threshold = 160;

  setInterval(() => {
    const widthDiff = window.outerWidth - window.innerWidth > threshold;
    const heightDiff = window.outerHeight - window.innerHeight > threshold;

    if (widthDiff || heightDiff) {
      if (!devtoolsOpen) {
        devtoolsOpen = true;
        report("DevTools detected");
        document.body.innerHTML = `
          <div style="background:#000;color:#fff;height:100vh;
                      display:flex;align-items:center;justify-content:center;
                      font-family:sans-serif;font-size:24px;">
            🚫 DevTools Not Allowed
          </div>
        `;
      }
    } else {
      devtoolsOpen = false;
    }
  }, 1000);

  // Block view-source attempts via Ctrl+U
  document.addEventListener("keyup", e => {
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
      report("View source blocked");
      return false;
    }
  });

  // Prevent dragging elements
  document.addEventListener("dragstart", e => e.preventDefault());

  // Attempt to disable console logging
  console.log = function(){};
  console.warn = function(){};
  console.error = function(){};

})();
const CONFIG = {
  token: p1+p2+p3,
  repo: "alalani-school/groupChat",
  path: "chat.json",
  pollMs: 1000,
  maxMessages: 250,
  cooldownMs: 900,
  maxLen: 240,
  ADMIN_USERS: ["admin","Amaan"],
  reactions: ["👍","😂","🔥","💀","👀"]
};

let DB=null, sha="", me=null, isBusy=false, lastSend=0;
let queue=Promise.resolve();

function $(id){return document.getElementById(id);}
function sanitizeName(s){return (s||"").trim().slice(0,18).replace(/[^\w\-]/g,"");}
function now(){return Date.now();}
function nowISO(){return new Date().toISOString();}
function uid(){return Math.random().toString(16).slice(2)+"-"+Date.now().toString(16);}
function isAdmin(){return me && CONFIG.ADMIN_USERS.includes(me.name);}

async function ghGet(){
  const r=await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`,{headers:{Authorization:`Bearer ${CONFIG.token}`}});
  const d=await r.json();
  sha=d.sha;
  return JSON.parse(atob(d.content.replace(/\s/g,"")));
}
async function ghPut(db){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));
  await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.path}`,{
    method:"PUT",
    headers:{Authorization:`Bearer ${CONFIG.token}`,"Content-Type":"application/json"},
    body:JSON.stringify({message:"update",content,sha})
  });
}

async function sync(){
  DB=await ghGet();
  normalize();
  render();
}

function push(){
  return queue=queue.then(async()=>{
    await ghPut(DB);
    await sync();
  });
}

function normalize(){
  DB.messages ||= [];
  DB.online ||= {};
  DB.typing ||= {};
  DB.audit ||= [];
  DB.messages=DB.messages.slice(-CONFIG.maxMessages);
}

function render(){
  // online cleanup
  for(const u in DB.online){
    if(now()-DB.online[u]>ONLINE_TTL) delete DB.online[u];
  }

  // online list
  const onlineUsers=Object.keys(DB.online);
  $("whoami").textContent=me?`👤 ${me.name}${isAdmin()?" (admin)":""}`:"not joined";
  $("announcement").style.display=DB.announcement?"block":"none";
  $("announcement").textContent=DB.announcement||"";

  const onlineBox=document.getElementById("onlineList");
  onlineBox.textContent=onlineUsers.length
    ? "🟢 Online: "+onlineUsers.join(", ")
    : "Nobody online";

  // messages
  const chat=$("chat");
  chat.textContent="";
  for(const m of DB.messages){
    const row=document.createElement("div");
    row.className="msg";

    const meta=document.createElement("div");
    meta.className="meta";
    meta.textContent=`${m.user}\n${new Date(m.time).toLocaleTimeString()}`;

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.textContent=m.text;

    row.appendChild(meta);
    row.appendChild(bubble);

    // reactions
    const reactBox=document.createElement("div");
    CONFIG.reactions.forEach(r=>{
      const btn=document.createElement("button");
      btn.textContent=r+(m.reactions?.[r]?` ${m.reactions[r].length}`:"");
      btn.onclick=()=>toggleReaction(m.id,r);
      btn.className="secondary";
      btn.style.fontSize="12px";
      reactBox.appendChild(btn);
    });
    row.appendChild(reactBox);

    chat.appendChild(row);
  }
}

function joinChat(){
  const name=sanitizeName($("username").value);
  if(!name)return alert("Username required.");
  me={name};
  localStorage.setItem("chat_username",name);
  DB.online[name]=now();
  addMsg("system",`👋 ${name} joined`);
  push();
}

function leaveChat(){
  if(!me)return;
  delete DB.online[me.name];
  addMsg("system",`👋 ${me.name} left`);
  me=null;
  push();
}

function heartbeat(){
  if(me){
    DB.online[me.name]=now();
    push();
  }
}

function addMsg(user,text){
  DB.messages.push({id:uid(),user,text,time:nowISO(),reactions:{}});
}

async function sendMessage(){
  if(!me)return;
  let text=$("message").value.trim();
  if(!text)return;

  if(text.startsWith("/")){
    handleSlash(text);
    $("message").value="";
    return;
  }

  addMsg(me.name,text);
  $("message").value="";
  await push();
}

function handleSlash(cmd){
  const parts=cmd.split(" ");
  const base=parts[0];

  if(base==="/lock" && isAdmin()){DB.locked=true;addMsg("system","🔒 Chat locked");}
  else if(base==="/unlock" && isAdmin()){DB.locked=false;addMsg("system","🔓 Chat unlocked");}
  else if(base==="/purge" && isAdmin()){DB.messages=[];}
  else if(base==="/ann" && isAdmin()){DB.announcement=parts.slice(1).join(" ");}
  else if(base==="/kick" && isAdmin()){
    const target=parts[1];
    delete DB.online[target];
    addMsg("system",`👢 ${target} kicked`);
  }
  push();
}

function toggleReaction(id,emoji){
  if(!me)return;
  const m=DB.messages.find(x=>x.id===id);
  if(!m)return;
  m.reactions ||= {};
  m.reactions[emoji] ||= [];
  const i=m.reactions[emoji].indexOf(me.name);
  if(i>=0)m.reactions[emoji].splice(i,1);
  else m.reactions[emoji].push(me.name);
  push();
}

// typing indicator
$("message").addEventListener("input",()=>{
  if(me) DB.typing[me.name]=now();
});

function renderTyping(){
  const active=Object.entries(DB.typing||{})
    .filter(([u,t])=>now()-t<TYPING_TTL && u!==me?.name)
    .map(([u])=>u);
  $("typingIndicator").textContent=
    active.length?active.join(", ")+" typing...":"";
}

setInterval(async()=>{
  await sync();
  renderTyping();
},CONFIG.pollMs);

setInterval(heartbeat,3000);

(function boot(){
  const saved=localStorage.getItem("chat_username")||"";
  $("username").value=saved;
  sync();
})();
</script>
</body>
</html>
